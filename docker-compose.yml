services:
  # ---------- Flask backend ----------
  app:
    image: ${DOCKER_USER:-username}/mafia-app:latest
    build: .
    container_name: mafia-app
    restart: always
    expose:
      - "5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/
      - SECRET_KEY=mafia-prod-secret-random-99
    depends_on:
      - mongo
    networks:
      - mafia-network

  # ---------- MongoDB ----------
  mongo:
    image: mongo:7
    container_name: mafia-mongo
    restart: always
    volumes:
      - mongo-data:/data/db
    expose:
      - "27017"
    networks:
      - mafia-network

  # ---------- Nginx reverse proxy ----------
  nginx:
    image: nginx:alpine
    container_name: mafia-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - mafia-network

volumes:
  mongo-data:


networks:
  mafia-network:
    driver: bridge
