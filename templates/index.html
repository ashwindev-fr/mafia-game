<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mafia Game – Join or Create Room</title>
        <meta
            name="description"
            content="Mafia party game voting app. Create or join a room to vote anonymously during daytime rounds."
        >
        <link rel="stylesheet" href="/static/style.css">
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        >
    </head>
    <body class="home-body">
        <!-- Floating particles background -->
        <div class="particles" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
        </div>

        <div class="home-container">
            <header class="home-header">
                <h1 class="logo">🎭 MAFIA</h1>
                <p class="tagline">Welcome to Mafia · The Ultimate Party Game</p>
                <p class="tagline" style="margin-top:2px;font-size:0.8rem;opacity:0.7">Powered by Pathshala Club</p>
            </header>

            <!-- Rejoin Banner (shown if active session found) -->
            <div class="glass-card hidden" id="rejoin-banner" style="border-color:var(--accent);margin-bottom:16px">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
                    <span style="font-size:1.5rem">🔄</span>
                    <div>
                        <h2 style="font-size:1rem;margin:0">Active Game Found</h2>
                        <p id="rejoin-info" style="color:var(--text-secondary);font-size:0.8rem;margin:2px 0 0"></p>
                    </div>
                </div>
                <div style="display:flex;gap:8px">
                    <button class="btn btn-primary" style="flex:1" onclick="rejoinGame()">Rejoin Game</button>
                    <button class="btn" style="flex:1;background:rgba(255,255,255,0.06)" onclick="dismissRejoin()">Join as New Player</button>
                </div>
            </div>

            <div class="card-grid">
                <!-- Join Room Card -->
                <div class="glass-card" id="join-card">
                    <div class="card-icon">🕵️</div>
                    <h2>Join Room</h2>
                    <p class="card-desc">Enter the code to play</p>
                    <form action="/join_room" method="POST" id="join-form">
                        <div class="input-group">
                            <label for="join_room_code">Room Code</label>
                            <input
                                type="text"
                                id="join_room_code"
                                name="room_code"
                                placeholder="e.g. X7K2P"
                                maxlength="6"
                                required
                                autocapitalize="characters"
                            >
                        </div>
                        <div class="input-group">
                            <label for="player_name">Your Name</label>
                            <input
                                type="text"
                                id="player_name"
                                name="player_name"
                                placeholder="Enter your name"
                                maxlength="20"
                                required
                            >
                        </div>
                        <button
                            type="submit"
                            class="btn btn-accent"
                            id="join-btn"
                        >
                            Join Room
                        </button>
                    </form>
                </div>

                <!-- Create Room Card -->
                <div class="glass-card" id="create-card">
                    <div class="card-icon">👑</div>
                    <h2>Create Room</h2>
                    <p class="card-desc">You are the Game Master</p>
                    <form action="/create_room" method="POST" id="create-form">
                        <div class="input-group">
                            <label for="max_players">Max Players</label>
                            <input
                                type="number"
                                id="max_players"
                                name="max_players"
                                value="10"
                                min="3"
                                max="30"
                                required
                            >
                        </div>
                        <div class="input-group">
                            <label for="room_code_input">Room Code <span
                                    class="optional"
                                >(optional)</span></label>
                            <input
                                type="text"
                                id="room_code_input"
                                name="room_code"
                                placeholder="Auto-generated"
                                maxlength="6"
                                autocapitalize="characters"
                            >
                        </div>
                        <button
                            type="submit"
                            class="btn btn-primary"
                            id="create-btn"
                        >
                            Create Room
                        </button>
                    </form>
                </div>
            </div>

            <footer class="home-footer">
                <p>Votes stay secret · No roles stored · Pure gameplay</p>
                <a href="/past_games" style="display:inline-block;margin-top:12px;color:var(--accent);font-size:0.85rem;text-decoration:none;font-weight:600">📂 Browse Past Games →</a>
            </footer>
        </div>
    </body>

    <script>
        // Check for active session and show rejoin banner
        (function() {
            try {
                const raw = localStorage.getItem("mafia_session");
                if (!raw) return;
                const session = JSON.parse(raw);
                if (!session || !session.room_code || !session.url) return;

                const banner = document.getElementById("rejoin-banner");
                const info = document.getElementById("rejoin-info");
                if (!banner || !info) return;

                if (session.type === "admin") {
                    info.textContent = `Admin · Room ${session.room_code}`;
                } else {
                    info.textContent = `${session.player_name || "Player"} · Room ${session.room_code}`;
                }
                banner.classList.remove("hidden");
            } catch(e) {}
        })();

        function rejoinGame() {
            try {
                const session = JSON.parse(localStorage.getItem("mafia_session"));
                if (session && session.url) {
                    window.location.href = session.url;
                }
            } catch(e) {}
        }

        function dismissRejoin() {
            localStorage.removeItem("mafia_session");
            document.getElementById("rejoin-banner").classList.add("hidden");
        }
    </script>
</html>
